<!DOCTYPE html>
<html lang="es">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teleprompter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c1e;color:#cfcfd5;font-family:system-ui,-apple-system,sans-serif;height:100dvh;display:flex;flex-direction:column}
#x{flex:1;overflow:auto;text-align:center;padding:8vh 5vw;font-size:clamp(18px,5vw,40px);line-height:1.8;-webkit-overflow-scrolling:touch}
#x span{display:inline;opacity:.4;transition:opacity .2s;margin-right:.25em}
#x span.c{opacity:1;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#b{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;padding:10px;background:rgba(255,255,255,.03)}
#b button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#ddd;border-radius:8px;padding:6px 14px;font-size:18px;cursor:pointer;touch-action:manipulation}
#b .s{font-size:12px;color:rgba(255,255,255,.4);padding:0 4px}
#w{font-size:14px;color:rgba(255,255,255,.4);padding:0 8px}
#s{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0c0c1e;color:#999;font-size:18px;z-index:10}
</style>
<div id=s>Cargando...</div>
<div id=x></div>
<div id=b style=display:none>
<button id=p>▶</button>
<button id=r>↺</button>
<span class=s>Vel</span><button id=vm>−</button><button id=vp>+</button>
<span class=s>Tam</span><button id=fm>−</button><button id=fp>+</button>
<span id=w>0/0</span>
</div>
<script>
var u=new URLSearchParams(location.search).get("u");
if(!u){document.querySelector("#s").textContent="Error: falta u";throw"no u"}
var px=["https://api.allorigins.win/get?url=","https://api.codetabs.com/v1/proxy?quest="];
function f(n){
if(n>=px.length){document.querySelector("#s").textContent="Error al cargar texto";return}
var isA=px[n].indexOf("allorigins")>-1;
fetch(px[n]+encodeURIComponent(u)).then(function(r){return isA?r.json():r.text()}).then(function(d){
var t=isA?d.contents:d;
var w=t.match(/\S+/g)||[],sp=0,pl=0,T,spd=300,fs=22,x=document.querySelector("#x");
x.innerHTML="<span></span>".repeat(w.length);
for(var i=0;i<w.length;i++)x.children[i].textContent=w[i];
var c=x.children;
function H(){for(var i=0;i<c.length;i++)c[i].className=i==sp?"c":"";document.querySelector("#w").textContent=(sp+1)+"/"+c.length}
H();
function N(){sp<c.length-1?(sp++,H()):P()}
function P(){pl=0;if(T){clearInterval(T);T=null}document.querySelector("#p").textContent="▶"}
function U(){if(pl){P();pl=1;T=setInterval(N,spd);document.querySelector("#p").textContent="⏸"}}
document.querySelector("#b").style.display="flex";document.querySelector("#s").style.display="none";
document.querySelector("#p").onclick=function(){if(pl)P();else{pl=1;this.textContent="⏸";T=setInterval(N,spd)}};
document.querySelector("#r").onclick=function(){P();sp=0;H();x.scrollTop=0};
document.querySelector("#vp").onclick=function(){spd=Math.max(50,spd-30);U()};
document.querySelector("#vm").onclick=function(){spd=Math.min(2000,spd+30);U()};
document.querySelector("#fp").onclick=function(){fs=Math.min(60,fs+2);x.style.fontSize=fs+"px"};
document.querySelector("#fm").onclick=function(){fs=Math.max(12,fs-2);x.style.fontSize=fs+"px"};
}).catch(function(){f(n+1)});
}
f(0);
</script>
</html>
