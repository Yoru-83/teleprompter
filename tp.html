<!DOCTYPE html>
<html lang="es">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teleprompter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c1e;color:#cfcfd5;font-family:system-ui,-apple-system,sans-serif;height:100dvh;display:flex;flex-direction:column}
#x{flex:1;overflow:auto;text-align:center;padding:8vh 5vw;font-size:clamp(18px,5vw,40px);line-height:1.8;-webkit-overflow-scrolling:touch;white-space:normal}
#x span{display:inline;opacity:.4;transition:opacity .2s;margin-right:.25em}
#x span.c{opacity:1;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#b{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;padding:10px;background:rgba(255,255,255,.03)}
#b button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#ddd;border-radius:8px;padding:6px 14px;font-size:18px;cursor:pointer;touch-action:manipulation}
#b .s{font-size:12px;color:rgba(255,255,255,.4);padding:0 4px}
#w{font-size:14px;color:rgba(255,255,255,.4);padding:0 8px}
#dv,#df{font-size:13px;color:rgba(255,255,255,.5);min-width:2.5em;text-align:center}
#s{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0c0c1e;color:#999;font-size:18px;z-index:10}
#d{font-size:12px;color:#555;margin-top:1em;padding:0 2em;word-break:break-all;text-align:center}
</style>
<div id=s><div id=m>Cargando...</div><div id=d></div></div>
<div id=x></div>
<div id=b style=display:none>
<button id=p>▶</button>
<button id=r>↺</button>
<span class=s>Vel</span><button id=vm>−</button><span id=dv></span><button id=vp>+</button>
<span class=s>Tam</span><button id=fm>−</button><span id=df></span><button id=fp>+</button>
<span id=w>0/0</span>
</div>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script>
var q = new URLSearchParams(location.search), t = q.get("t"), g = q.get("g"), sp, pl, T, spd, fs, x, c;
if (!t && location.hash.length > 1) { var h = location.hash.slice(1); try { t = LZString.decompressFromEncodedURIComponent(h) || h } catch (e) { t = decodeURIComponent(h) } }
function H() { for (var i = 0; i < c.length; i++) c[i].className = i == sp ? "c" : ""; document.querySelector("#w").textContent = (sp + 1) + "/" + c.length }
function S() { var e = c[sp]; if (!e) return; var r = e.getBoundingClientRect(), h = window.innerHeight; if (r.bottom > h * 0.75 || r.top < 0) x.scrollBy({ top: r.top - h * 0.3, behavior: 'smooth' }) }
function N() { sp < c.length - 1 ? (sp++, H(), S()) : P() }
function P() { pl = 0; if (T) { clearInterval(T); T = null } document.querySelector("#p").textContent = "▶" }
function U() { if (pl) { P(); pl = 1; T = setInterval(N, spd); document.querySelector("#p").textContent = "⏸" } }
function R() { document.querySelector("#dv").textContent = spd + "ms"; document.querySelector("#df").textContent = fs + "px" }
function setup() {
  document.querySelector("#b").style.display = "flex"; document.querySelector("#s").style.display = "none";
  document.querySelector("#p").onclick = function () { if (pl) P(); else { pl = 1; this.textContent = "⏸"; T = setInterval(N, spd) } };
  document.querySelector("#r").onclick = function () { P(); sp = 0; H(); S() };
  document.querySelector("#vp").onclick = function () { spd = Math.max(50, spd - 30); R(); U() };
  document.querySelector("#vm").onclick = function () { spd = Math.min(2000, spd + 30); R(); U() };
  document.querySelector("#fp").onclick = function () { fs = Math.min(60, fs + 2); x.style.fontSize = fs + "px"; R() };
  document.querySelector("#fm").onclick = function () { fs = Math.max(12, fs - 2); x.style.fontSize = fs + "px"; R() };
}
function render(s) {
  s = s.replace(/\+/g, " ");
  var w = s.match(/\S+/g) || [];
  if (!w.length) { document.querySelector("#m").textContent = "Texto vacío"; return }
  x = document.querySelector("#x"); sp = 0; pl = 0; T = null; spd = 300; fs = 22;
  x.innerHTML = "<span></span> ".repeat(w.length);
  for (var i = 0; i < w.length; i++) x.children[i].textContent = w[i];
  c = x.children; H(); S(); R(); setup();
}
if (t) { render(t) }
else if (g) {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.github.com/gists/" + g, true);
  xhr.onload = function () { try { var d = JSON.parse(xhr.responseText), k = Object.keys(d.files)[0]; if (k) render(d.files[k].content) } catch (e) { document.querySelector("#m").textContent = "Error Gist" } };
  xhr.onerror = function () { document.querySelector("#m").textContent = "Error red" };
  xhr.send();
} else { document.querySelector("#m").textContent = "Error: sin texto"; document.querySelector("#d").textContent = "URL: " + location.href; throw "no text" }
</script>
</html>
