<!DOCTYPE html>
<html lang="es">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teleprompter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c1e;color:#cfcfd5;font-family:system-ui,-apple-system,sans-serif;height:100dvh;display:flex;flex-direction:column}
#x{flex:1;overflow:auto;text-align:center;padding:8vh 5vw;font-size:clamp(18px,5vw,40px);line-height:1.8;-webkit-overflow-scrolling:touch}
#x span{display:inline;opacity:.4;transition:opacity .2s}
#x span.c{opacity:1;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#b{display:flex;gap:8px;justify-content:center;align-items:center;padding:12px;background:rgba(255,255,255,.03)}
#b button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#ddd;border-radius:8px;padding:8px 24px;font-size:20px;cursor:pointer;touch-action:manipulation}
#w{font-size:14px;color:rgba(255,255,255,.4)}
#s{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0c0c1e;color:#999;font-size:18px;z-index:10}
</style>
<div id=s>Cargando...</div>
<div id=x></div>
<div id=b style=display:none>
<button id=p>▶</button>
<button id=r>↺</button>
<span id=w>0/0</span>
</div>
<script>
var u=new URLSearchParams(location.search).get("u");
if(!u){document.querySelector("#s").textContent="Error: falta parámetro u";throw"no u"}
fetch("https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(u)).then(function(r){return r.text()}).then(function(t){
var w=t.match(/\S+/g)||[],s=0,pl=0,T,x=document.querySelector("#x");
x.innerHTML="<span></span>".repeat(w.length);
for(var i=0;i<w.length;i++)x.children[i].textContent=w[i];
var c=x.children;
function H(){for(var i=0;i<c.length;i++)c[i].className=i==s?"c":"";document.querySelector("#w").textContent=(s+1)+"/"+c.length}
H();
function N(){s<c.length-1?(s++,H()):P()}
function P(){pl=0;if(T){clearInterval(T);T=null}document.querySelector("#p").textContent="▶"}
document.querySelector("#b").style.display="flex";document.querySelector("#s").style.display="none";
document.querySelector("#p").onclick=function(){if(pl)P();else{pl=1;this.textContent="⏸";T=setInterval(N,Math.max(100,300))}};
document.querySelector("#r").onclick=function(){P();s=0;H();x.scrollTop=0};
}).catch(function(e){document.querySelector("#s").textContent="Error al cargar texto"});
</script>
</html>
